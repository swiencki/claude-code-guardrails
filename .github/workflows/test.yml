name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lint bash scripts
        run: shellcheck -x scripts/*.sh tests/*.sh

      - name: Lint JSON fragments
        run: |
          failed=0
          for f in $(find layers profiles -name '*.json' 2>/dev/null); do
            jq empty "$f" 2>/dev/null || { echo "FAIL: $f"; failed=1; }
          done
          [ "$failed" -eq 0 ] || exit 1

      - name: Run tests
        run: make test
